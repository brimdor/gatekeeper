name: Bug Report
description: Report something that's broken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run gatekeeper serve with..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `gatekeeper serve`
        2. Make a request to `/api/v1/drive/files/list`
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Gatekeeper version
      description: Run `gatekeeper --version` or check pyproject.toml
      placeholder: "0.1.0"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - pip/uv install
        - Docker
        - Podman
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Please remove any API keys, tokens, or secrets before pasting.
      render: shell