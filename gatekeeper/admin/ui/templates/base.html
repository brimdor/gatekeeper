<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gatekeeper{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-200 min-h-full">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col">
            <div class="p-4 border-b border-gray-700">
                <h1 class="text-xl font-bold text-white flex items-center gap-2">
                    <span class="text-2xl">🔐</span> Gatekeeper
                </h1>
                <p class="text-xs text-gray-400 mt-1">Google Workspace Policy Gateway</p>
            </div>
            <nav class="flex-1 p-2 space-y-1">
                <a href="/admin/" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {% if page == 'dashboard' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>📊</span> Dashboard
                </a>
                <a href="/admin/modules" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {% if page == 'modules' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>📦</span> Modules
                </a>
                <a href="/admin/routes" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {% if page == 'routes' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>🔀</span> Routes
                </a>
                <a href="/admin/keys" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {% if page == 'keys' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>🔑</span> API Keys
                </a>
                <a href="/admin/audit" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {% if page == 'audit' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>📋</span> Audit Log
                </a>
                <a href="/admin/auth" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {% if page == 'auth' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <span>🔗</span> Auth Status
                </a>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <p class="text-xs text-gray-500">Gatekeeper v{{ version }}</p>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
