{% extends "base.html" %}
{% block title %}Routes — Gatekeeper{% endblock %}
{% set page = "routes" %}
{% block content %}
<div class="mb-8">
    <h2 class="text-2xl font-bold text-white">Route Policies</h2>
    <p class="text-gray-400 mt-1">Enable/disable routes and configure policy settings</p>
</div>
<div class="mb-4">
    <select id="module-filter" onchange="filterRoutes()" class="bg-gray-800 border border-gray-600 text-gray-200 rounded px-3 py-2 text-sm">
        <option value="">All Modules</option>
        <option value="drive">Drive</option>
        <option value="gmail">Gmail</option>
        <option value="calendar">Calendar</option>
    </select>
</div>
<div id="routes-table" class="text-gray-500">Loading routes...</div>
<script>
const policies = [];
fetch('/admin/api/routes').then(r => r.json()).then(data => {
    policies.length = 0;
    data.forEach(p => policies.push(p));
    renderRoutes();
});

function filterRoutes() {
    renderRoutes();
}

function renderRoutes() {
    const filter = document.getElementById('module-filter').value;
    const filtered = filter ? policies.filter(p => p.module === filter) : policies;
    let html = '<table class="w-full text-sm"><thead><tr class="text-gray-400 border-b border-gray-700"><th class="text-left p-2">Module</th><th class="text-left p-2">Route</th><th class="text-left p-2">Description</th><th class="text-left p-2">Enabled</th><th class="text-left p-2">Policy</th></tr></thead><tbody>';
    filtered.forEach(p => {
        const enabledClass = p.enabled ? 'text-green-400' : 'text-red-400';
        html += `<tr class="border-b border-gray-800 hover:bg-gray-800">
            <td class="p-2 font-mono">${p.module}</td>
            <td class="p-2 font-mono text-blue-300">${p.route}</td>
            <td class="p-2 text-gray-400">${p.description || ''}</td>
            <td class="p-2">
                <button onclick="toggleRoute(${p.id}, ${!p.enabled})" class="px-2 py-1 text-xs rounded ${p.enabled ? 'bg-green-800 text-green-300' : 'bg-red-800 text-red-300'}">
                    ${p.enabled ? '✅ On' : '❌ Off'}
                </button>
            </td>
            <td class="p-2">
                <details class="cursor-pointer">
                    <summary class="text-xs text-gray-400">View Config</summary>
                    <pre class="text-xs bg-gray-900 p-2 rounded mt-1 overflow-x-auto">${p.policy_config}</pre>
                </details>
            </td>
        </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('routes-table').innerHTML = html;
}

async function toggleRoute(id, enabled) {
    const resp = await fetch(`/admin/api/routes/${id}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json', 'Authorization': 'Basic ' + btoa('admin:' + getAdminPassword())},
        body: JSON.stringify({enabled: enabled})
    });
    if (resp.ok) {
        const updated = await resp.json();
        const idx = policies.findIndex(p => p.id === updated.id);
        if (idx >= 0) policies[idx] = updated;
        renderRoutes();
    }
}

function getAdminPassword() {
    return localStorage.getItem('gatekeeper_admin_pass') || 'admin';
}
</script>
{% endblock %}
