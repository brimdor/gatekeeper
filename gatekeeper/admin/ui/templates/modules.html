{% extends "base.html" %}
{% block title %}Modules — Gatekeeper{% endblock %}
{% set page = "modules" %}
{% block content %}
<div class="mb-8">
    <h2 class="text-2xl font-bold text-white">Modules</h2>
    <p class="text-gray-400 mt-1">Enable or disable Google Workspace modules</p>
</div>
<div id="modules-list" hx-get="/admin/api/modules" hx-trigger="load" hx-swap="innerHTML">
    <p class="text-gray-500">Loading modules...</p>
</div>
<script>
fetch('/admin/api/modules').then(r => r.json()).then(modules => {
    let html = '<div class="grid grid-cols-1 md:grid-cols-3 gap-6">';
    modules.forEach(m => {
        html += `
        <div class="bg-gray-800 rounded-lg p-6 border ${m.enabled ? 'border-green-700' : 'border-gray-700'}">
            <div class="flex items-center justify-between mb-3">
                <span class="text-3xl">${m.icon}</span>
                <button hx-post="/admin/api/modules/${m.name}/toggle" hx-swap="none" hx-on::after-request="location.reload()" class="px-3 py-1 text-sm rounded ${m.enabled ? 'bg-red-700 hover:bg-red-600' : 'bg-green-700 hover:bg-green-600'} text-white">
                    ${m.enabled ? 'Disable' : 'Enable'}
                </button>
            </div>
            <h3 class="text-lg font-semibold text-white">${m.display_name}</h3>
            <p class="text-sm text-gray-400 mt-1">${m.description}</p>
            <p class="text-xs text-gray-500 mt-3">${m.route_count} routes active</p>
            <div class="mt-3">
                <p class="text-xs text-gray-400">Required scopes:</p>
                ${m.scopes.map(s => '<span class="inline-block text-xs bg-gray-700 rounded px-2 py-0.5 mt-1 mr-1 text-gray-300">' + s.replace('https://www.googleapis.com/auth/', '') + '</span>').join('')}
            </div>
        </div>`;
    });
    html += '</div>';
    document.getElementById('modules-list').innerHTML = html;
});
</script>
{% endblock %}
